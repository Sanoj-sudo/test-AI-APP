name: Build, Push & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch: {}   # allows manual "Run workflow" trigger too

concurrency:
  group: production-deploy
  cancel-in-progress: false   # never cancel a deploy mid-flight

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/ai-deploy-stack-api

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Copy the compose file + nginx configs to the server so infra changes
      # (not just app code) also get deployed.
      - name: Copy deployment files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          source: "docker-compose.yml,nginx/"
          target: "~/ai-deploy-stack"
          strip_components: 0

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            set -e
            cd ~/ai-deploy-stack

            # .env lives only on the server (never in git/CI). Update the
            # image tag CI just built so compose pulls the exact new build.
            sed -i '/^IMAGE_TAG=/d' .env
            echo "IMAGE_TAG=${{ github.sha }}" >> .env
            sed -i '/^DOCKERHUB_USERNAME=/d' .env
            echo "DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }}" >> .env

            docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" -p "${{ secrets.DOCKERHUB_TOKEN }}"

            docker compose pull api
            # Rolling restart: recreate ONLY the api container from the image
            # we just pulled. Do NOT use --build here: the server only has
            # docker-compose.yml + nginx/ (see the scp step above), not the
            # Dockerfile or app/ source, and the image is already built and
            # pushed by the build-and-push job. Building here would either fail
            # (no context) or silently deploy stale code from an old clone.
            docker compose up -d --no-deps api
            # Ensure the supporting services exist (no-op if already running).
            docker compose up -d postgres redis nginx
            # Recreating api gives it a new container IP. NGINX resolves the
            # "api" upstream once at startup and caches it, so it would keep
            # proxying to the dead old IP (502s) until reloaded. A reload
            # re-resolves the name with zero downtime; fall back to recreating
            # nginx if the reload can't run (e.g. first deploy).
            docker compose exec -T nginx nginx -s reload \
              || docker compose up -d --force-recreate --no-deps nginx

            # Wait for health check to pass before declaring success
            for i in $(seq 1 10); do
              if curl -fsS http://localhost/health; then
                echo "Health check passed"
                break
              fi
              echo "Waiting for app to become healthy... ($i/10)"
              sleep 3
            done

            docker image prune -f
